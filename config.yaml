data:
  train_samples: 24000
  val_samples: 3000
  test_samples: 3000
  d_range: [50, 100, 200]
  r_range: [1, 10]
  noise_levels: [0.0, 1e-6, 1e-4, 1e-3, 1e-2]
  include_hard_samples: false

model:
  input_dim: 3
  hidden_dim: 128
  output_dim: 10
  R_max: 10
  delta: 6
  layers: 4
  dropout: 0.2

training:
  n_epochs: 200
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.0001
  lambda_aux: 0.1
  patience: 10
  model_save_path: ./models/rank_gnn_fast.pth

solver:
  tau: 1e-2
  kappa: 0.1

logging:
  level: info
  log_dir: ./logs

visualization:
  enabled: true
  save_dir: ./visualizations